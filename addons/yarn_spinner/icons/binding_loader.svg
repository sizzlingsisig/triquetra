<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="16" height="16" viewBox="0 0 16 16" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Yarn Binding Loader Icon: Chain link representing connections -->
    <g fill="none" stroke="rgb(55,137,95)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Left link -->
        <rect x="1.5" y="5" width="5" height="6" rx="2"/>
        <!-- Right link -->
        <rect x="9.5" y="5" width="5" height="6" rx="2"/>
        <!-- Connection overlap -->
        <line x1="6.5" y1="8" x2="9.5" y2="8"/>
    </g>
    <!-- Small dots representing data flow -->
    <g fill="rgb(55,137,95)">
        <circle cx="8" cy="3" r="1"/>
        <circle cx="8" cy="13" r="1"/>
    </g>
</svg>
